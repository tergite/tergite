[general_config]
# general static configuration for the backend
name = "Loke"
is_active = true
characterized = true
open_pulse = true
simulator = true
version = "2024.04.1"
online_date = "2024-05-23T09:12:00.733Z"
num_qubits = 2
num_couplers = 1
num_resonators = 2
description = "2 qubit device in Loke"
dt = 1e-9
dtm = 1e-9

[device_config]
# config names for specification of calibration values
# probably not entirely true for everything herein but mostly so
discriminators = [ "lda"]

qubit_ids = ["q0", "q1"]

coordinates = [
      [1, 1],
      [2, 1]
    ]

meas_map = [[0, 1]]

qubit_parameters = [
  "id",
  "x_position",
  "y_position",
  "xy_drive_line",
  "z_drive_line",
  "frequency",
  "pi_pulse_amplitude",
  "pi_pulse_duration",
  "pi_pulse_motzoi",
  "pulse_type",
  "pulse_sigma",
  "t1_decoherence",
  "t2_decoherence"
]
resonator_parameters = [
  "id",
  "x_position",
  "y_position",
  "readout_line",
  "acq_delay",
  "acq_integration_time",
  "frequency",
  "pulse_delay",
  "pulse_duration",
  "pulse_type",
  "pulse_amplitude"
]

coupler_parameters = [
  "id",
  "frequency",
  "frequency_detuning",
  "anharmonicity",
  "coupling_strength_02",
  "coupling_strength_12",
  "cz_pulse_amplitude",
  "cz_pulse_dc_bias",
  "cz_pulse_phase_offset",
  "cz_pulse_duration_before",
  "cz_pulse_duration_rise",
  "cz_pulse_duration_constant",
  "control_rz_lambda",
  "target_rz_lambda",
  "pulse_type"
]

[device_config.coupling_dict]
u0 = ["q0", "q1"]

[device_config.discriminator_parameters]
lda = [
  "coef_0",
  "coef_1",
  "intercept"
]

[gates.u]
qubits = [ 0 ]
qasm_def = "gate id q { U(0, 0, 0) q; }"
parameters = [ ]

[gates.h]
qubits = [ 0 ]
qasm_def = "gate id q { U(0, 0, 0) q; }"
parameters = [ ]

[gates.x]
qubits = [ 0 ]
qasm_def = "gate id q { U(0, 0, 0) q; }"
parameters = [ ]

