---
services:
  mss:
    image: "tergite/tergite-mss:sdk-e2e"
    depends_on:
      tergite-mongo:
        condition: service_healthy
    networks:
      - tergite-e2e
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --header="Authorization: Bearer $MSS_APP_TOKEN" --quiet --tries=1 --spider http://mss:8002/jobs || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  dashboard:
    image: "tergite/tergite-dashboard:sdk-e2e"
    depends_on:
      mss:
        condition: service_healthy
    networks:
      - tergite-e2e
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  tergite-mongo:
    restart: always
    image: mongo
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "27018:27017"
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - tergite-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  tergite-redis:
    restart: always
    image: redis
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "6378:6379"
    networks:
      - tergite-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  qiskit_pulse_1q:
    restart: always
    depends_on:
      mss:
        condition: service_healthy
      tergite-redis:
        condition: service_healthy
    image: "tergite/tergite-backend-e2e:sdk-e2e"
    build:
      context: ../tergite-backend
      dockerfile: Dockerfile
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "8001:8000"
    environment:
      MSS_MACHINE_ROOT_URL: "http://mss:8002"
      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8000"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "qiskit_pulse_1q"
      DEFAULT_PREFIX: "qiskit_pulse_1q"
      MSS_APP_TOKEN: ${MSS_APP_TOKEN}
      APP_SETTINGS: "production"
      IS_AUTH_ENABLED: "True"
      REDIS_PORT: 6379
      REDIS_HOST: "tergite-redis"
      JWT_SECRET: "dd94de9017e976973769aaf5d426fdb95cab46feda584dbdbc5f3f02bbf8ae8ce77211d7"
      CORS_ORIGINS: "127.0.0.1,localhost"
    volumes:
      - ./.env:/code/.env:ro
      - ./qiskit_pulse_1q.toml:/code/backend_config.toml:ro
      - ./qiskit_pulse_1q.seed.toml:/code/calibration.seed.toml:ro
      - ./private-qiskit-pulse-1q-key.pem:/code/private-bcc-key.pem:ro
      - ./public-mss-key.pem:/code/public-mss-key.pem:ro
      - ./qiskit_pulse_1q_booking_db.db:/code/booking_db.db:rw
    networks:
      - tergite-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  qiskit_pulse_2q:
    restart: always
    depends_on:
      qiskit_pulse_1q:
        condition: service_healthy
      mss:
        condition: service_healthy
      tergite-redis:
        condition: service_healthy
    image: "tergite/tergite-backend-e2e:sdk-e2e"
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "8000:8000"
    environment:
      MSS_MACHINE_ROOT_URL: "http://mss:8002"
      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8000"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "qiskit_pulse_2q"
      DEFAULT_PREFIX: "qiskit_pulse_2q"
      MSS_APP_TOKEN: ${MSS_APP_TOKEN}
      APP_SETTINGS: "production"
      IS_AUTH_ENABLED: "True"
      REDIS_PORT: 6379
      REDIS_HOST: "tergite-redis"
      JWT_SECRET: "e9fae9efa7c3ff10348acde323baa5273db8021712ecb1f59fdf0e8336240fb7d70c6d8d"
      CORS_ORIGINS: "127.0.0.1,localhost"
    volumes:
      - ./.env:/code/.env:ro
      - ./qiskit_pulse_2q.toml:/code/backend_config.toml:ro
      - ./qiskit_pulse_2q.seed.toml:/code/calibration.seed.toml:ro
      - ./private-qiskit-pulse-2q-key.pem:/code/private-bcc-key.pem:ro
      - ./public-mss-key.pem:/code/public-mss-key.pem:ro
      - ./qiskit_pulse_2q_booking_db.db:/code/booking_db.db:rw
    networks:
      - tergite-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  tergite-e2e:
